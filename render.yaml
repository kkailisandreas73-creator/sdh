# Render Blueprint — free tier Web Service + PostgreSQL
# Deploy: Render Dashboard → New → Blueprint → connect repo kkailisandreas73-creator/sdh

databases:
  - name: sdh-db
    plan: free
    databaseName: sdh
    user: sdh

services:
  - type: web
    name: sdh-web
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: sh scripts/render-start.sh
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sdh-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        fromService:
          type: web
          name: sdh-web
          envVarKey: AUTH_SECRET
      - key: AUTH_TRUST_HOST
        value: "true"
